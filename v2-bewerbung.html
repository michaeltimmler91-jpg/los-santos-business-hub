<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bewerbung</title>

  <link rel="stylesheet" href="./v2-style.css?v=506">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="v2-hero">

  <div class="hero-top-actions hero-left-actions">
    <button onclick="window.location.href='v2-firmen.html'">
      Firmen&uuml;bersicht
    </button>
  </div>

  <div class="hero-top-actions">
    <button onclick="window.location.href='v2-dashboard.html'">
      Dashboard
    </button>

    <button onclick="logoutUser()">
      Ausloggen
    </button>
  </div>

</header>

<div class="auth-page">

  <div class="admin-wrapper">

    <div class="dashboard-welcome-card">

      <span class="hub-kicker">
        Bewerbungssystem
      </span>

      <h2 id="businessTitle">
        Bewerbung
      </h2>

      <p>
        Bewirb dich direkt &uuml;ber den Los Santos Business Hub.
      </p>

    </div>

    <div class="bewerbung-wrapper">

      <div class="application-box">

        <div class="application-badge">
          Bewerbungssystem
        </div>

        <h2 class="application-company" id="businessName">
          Firma wird geladen...
        </h2>

        <div id="applicationNote" class="bewerbung-note"></div>

        <div id="questionsBox" class="bewerbung-questions"></div>

        <div class="application-question">

          <label>
            Zus&auml;tzliche Nachricht
          </label>

          <textarea
            id="messageText"
            placeholder="Optional kannst du hier noch etwas zus&auml;tzlich schreiben..."
          ></textarea>

        </div>

        <div class="application-send">

          <button onclick="sendApplication()">
            Bewerbung absenden
          </button>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="./v2-bewerbung.js?v=507"></script>

<script>
loadApplicationPage();
</script>

</body>
</html>
