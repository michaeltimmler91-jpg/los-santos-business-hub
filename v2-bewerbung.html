<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bewerbung</title>

  <link rel="stylesheet" href="./v2-style.css?v=502">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<header class="v2-hero">

  <div class="hero-top-actions hero-left-actions">

    <button onclick="window.location.href='v2-firmen.html'">
      Firmen&uuml;bersicht
    </button>

  </div>

  <div class="hero-top-actions">

    <button onclick="window.location.href='v2-dashboard.html'">
      Dashboard
    </button>

    <button onclick="logoutUser()">
      Ausloggen
    </button>

  </div>

</header>


<div class="auth-page">

  <div class="firmen-header">

    <div class="firmen-header-left">

      <div class="firma-logo-wrap">

        <img
          id="businessLogo"
          src="./img/default-business.png"
          alt="Logo"
          class="firma-logo"
        >

      </div>

      <div>

        <h1 id="businessTitle">
          Bewerbung
        </h1>

        <p class="firmen-subtitle">
          Bewirb dich direkt &uuml;ber den Los Santos Business Hub
        </p>

      </div>

    </div>

    <button
      class="owner-gray-btn"
      onclick="goBack()"
    >
      Zur&uuml;ck
    </button>

  </div>

  <div class="bewerbung-layout">

    <div class="bewerbung-card">

      <div class="bewerbung-top">

        <div>

          <div class="bewerbung-badge">
            Bewerbungssystem
          </div>

          <h2 id="businessName">
            Firma wird geladen...
          </h2>

        </div>

      </div>

      <div
        id="applicationNote"
        class="bewerbung-note"
      ></div>

      <div
        id="questionsBox"
        class="bewerbung-questions"
      ></div>

      <div class="bewerbung-extra">

        <label>
          Zus&auml;tzliche Nachricht
        </label>

        <textarea
          id="messageText"
          placeholder="Optional kannst du hier noch etwas zus&auml;tzlich schreiben..."
        ></textarea>

      </div>

      <button
        class="bewerbung-send-btn"
        onclick="sendApplication()"
      >
        Bewerbung absenden
      </button>

    </div>

  </div>

</div>

<script src="./v2-bewerbung.js?v=502"></script>

<script>
loadApplicationPage();
</script>

</body>
</html>
