<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registrieren</title>

<link rel="stylesheet" href="./v2-style.css?v=311">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="login-background"></div>
<div class="login-page">

  <div class="login-card">

    <div class="login-logo">
      Los Santos<br>
      <span>Business Hub</span>
    </div>

    <h1>Registrieren</h1>

    <p>
      Erstelle deinen Account. Nach der Registrierung muss dich ein Guide oder Superadmin freischalten.
    </p>

    <input
      type="text"
      id="registerLoginName"
      placeholder="Loginname"
    >

    <input
      type="text"
      id="registerDisplayName"
      placeholder="Anzeigename"
    >

    <input
      type="password"
      id="registerPassword"
      placeholder="Passwort"
    >

    <input
      type="password"
      id="registerPasswordRepeat"
      placeholder="Passwort wiederholen"
    >

    <button onclick="registerUser()">
      Registrieren
    </button>

    <div class="register-info">
      <strong>Hinweis:</strong>
      Dein Account ist nach der Registrierung noch nicht aktiv. Ein Guide oder Superadmin muss dich erst freischalten.
    </div>

    <div class="login-links">

      <a href="v2-login.html">
        Schon einen Account? Einloggen
      </a>

    </div>

  </div>

</div>

<script src="./v2-auth.js?v=900"></script>

</body>
</html>
