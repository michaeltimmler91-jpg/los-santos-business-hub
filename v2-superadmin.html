<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>V2 Superadmin</title>

  <link rel="stylesheet" href="./v2-style.css?v=30">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="auth-page">

  <div class="admin-wrapper">

    <div class="admin-topbar">
      <h1>Superadmin Panel</h1>

      <button onclick="logoutUser()">
        Ausloggen
      </button>
    </div>

    <div class="admin-box">

      <h2>Neue Firma anlegen</h2>

      <input type="text" id="businessName" placeholder="Firmenname">

      <select id="businessCategory">
        <option value="food">Essen &amp; Lieferung</option>
        <option value="service">Unternehmen &amp; Service</option>
        <option value="government">Beh&ouml;rden</option>
        <option value="workshop">Werkstatt</option>
      </select>

      <textarea id="businessDescription" placeholder="Beschreibung"></textarea>

      <input type="text" id="businessPlz" placeholder="PLZ">

      <label class="checkbox-line">
        <input type="checkbox" id="businessHasDelivery">
        Firma darf Lieferfunktion nutzen
      </label>

      <label class="file-label">
        Firmenfoto hochladen
        <input type="file" id="businessImage" accept="image/*">
      </label>

      <button onclick="createBusiness()">
        Firma erstellen
      </button>

    </div>

    <div class="admin-box">

      <h2>Alle Firmen</h2>

      <div id="businessList"></div>

    </div>

  </div>

</div>

<div class="edit-modal hidden" id="editModal">

  <div class="edit-box">

    <h2>Firma bearbeiten</h2>

    <input type="hidden" id="editBusinessId">

    <input type="text" id="editBusinessName" placeholder="Firmenname">

    <select id="editBusinessCategory">
      <option value="food">Essen &amp; Lieferung</option>
      <option value="service">Unternehmen &amp; Service</option>
      <option value="government">Beh&ouml;rden</option>
      <option value="workshop">Werkstatt</option>
    </select>

    <textarea id="editBusinessDescription" placeholder="Beschreibung"></textarea>

    <input type="text" id="editBusinessPlz" placeholder="PLZ">

    <label class="checkbox-line">
      <input type="checkbox" id="editBusinessHasDelivery">
      Firma darf Lieferfunktion nutzen
    </label>

    <label class="file-label">
      Neues Firmenfoto hochladen
      <input type="file" id="editBusinessImage" accept="image/*">
    </label>

    <h3>Inhaber &auml;ndern</h3>

    <select id="editOwnerSelect"></select>

    <button onclick="saveBusinessEdit()">
      Speichern
    </button>

    <button class="danger-btn" onclick="deleteBusiness()">
      Firma l&ouml;schen
    </button>

    <button class="gray-btn" onclick="closeEditModal()">
      Abbrechen
    </button>

  </div>

</div>

<script src="./v2-superadmin.js?v=30"></script>

<script>
checkSuperadmin();
</script>

</body>
</html>
