<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Superadmin Panel</title>

  <link rel="stylesheet" href="./v2-style.css?v=3100">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="v2-hero">

<div class="hero-top-actions hero-left-actions">

  <button onclick="window.location.href='v2-firmen.html'">
    Firmen&uuml;bersicht
  </button>

</div>

<div class="hero-top-actions">

  <button onclick="window.location.href='v2-dashboard.html'">
    Dashboard
  </button>

  <button onclick="logoutUser()">
    Ausloggen
  </button>

</div>

</header>

<div class="auth-page">

  <div class="admin-wrapper">

    <div class="dashboard-welcome-card">

      <span class="hub-kicker">
        Systemverwaltung
      </span>

      <h2>
        Superadmin Panel
      </h2>

      <p>
        Firmen erstellen, Unternehmen bearbeiten, Inhaber verwalten
        und Bewertungen moderieren.
      </p>

    </div>

    <div class="superadmin-grid">

      <section class="superadmin-card">

        <h2>Neue Firma erstellen</h2>

        <label>Firmenname</label>
        <input type="text" id="businessName" placeholder="Firmenname">

        <label>Kategorie</label>
        <select id="businessCategory">
          <option value="service">Unternehmen &amp; Service</option>
          <option value="food">Essen &amp; Lieferung</option>
          <option value="government">Beh&ouml;rde</option>
          <option value="workshop">Werkstatt</option>
        </select>

        <label>Standort</label>
        <input type="text" id="businessPlz" placeholder="Standort / Gegend">

        <label>Beschreibung</label>
        <textarea id="businessDescription" placeholder="Beschreibung"></textarea>

        <label>Firmenbild</label>
        <input type="file" id="businessImage" accept="image/*">

        <label class="checkbox-line">
          <input type="checkbox" id="businessHasDelivery">
          Hat Lieferung
        </label>

        <button onclick="createBusiness()">
          Firma erstellen
        </button>

      </section>

      <section class="superadmin-card superadmin-wide-card">

        <h2>Alle Firmen</h2>

        <div id="businessList"></div>

      </section>

    </div>

    <section class="superadmin-card superadmin-wide-card superadmin-reviews-card">

      <div class="superadmin-section-head">

        <div>
          <span class="hub-kicker">
            Moderation
          </span>

          <h2>
            Bewertungen verwalten
          </h2>

          <p>
            Bewertungen, Kommentare und Unternehmensantworten pr&uuml;fen
            oder entfernen.
          </p>
        </div>

        <button onclick="loadAllReviews()">
          Bewertungen laden
        </button>

      </div>

      <div id="adminReviewsList"></div>

    </section>

  </div>

</div>

<div id="editModal" class="edit-modal hidden">

  <div class="edit-box">

    <h2>Firma bearbeiten</h2>

    <input type="hidden" id="editBusinessId">

    <label>Firmenname</label>
    <input type="text" id="editBusinessName">

    <label>Kategorie</label>
    <select id="editBusinessCategory">
      <option value="service">Unternehmen &amp; Service</option>
      <option value="food">Essen &amp; Lieferung</option>
      <option value="government">Beh&ouml;rde</option>
      <option value="workshop">Werkstatt</option>
    </select>

    <label>Standort</label>
    <input type="text" id="editBusinessPlz">

    <label>Beschreibung</label>
    <textarea id="editBusinessDescription"></textarea>

    <label>Website</label>
    <input type="text" id="editBusinessWebsite">

    <label>Verteiler / Discord</label>
    <input type="text" id="editBusinessDiscord">

    <label>Neues Firmenbild</label>
    <input type="file" id="editBusinessImage" accept="image/*">

    <label class="checkbox-line">
      <input type="checkbox" id="editBusinessHasDelivery">
      Hat Lieferung
    </label>

    <label>Firmeninhaber</label>
    <select id="editOwnerSelect">
      <option value="">Kein Inhaber</option>
    </select>

    <div class="owner-button-row">

      <button onclick="saveBusinessEdit()">
        Speichern
      </button>

      <button class="danger-btn" onclick="deleteBusiness()">
        Firma l&ouml;schen
      </button>

      <button class="owner-gray-btn" onclick="closeEditModal()">
        Abbrechen
      </button>

    </div>

  </div>

</div>

<script src="./v2-superadmin.js?v=3100"></script>

<script>
checkSuperadmin();
</script>

</body>
</html>
