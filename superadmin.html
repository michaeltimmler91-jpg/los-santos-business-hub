<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SuperOwner Admin Panel</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      background:#050510;
      color:white;
      font-family:Arial,sans-serif;
      padding:0;
    }

    .top-nav{
      width:100%;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      padding:16px;
      background:#0b0b16;
      border-bottom:1px solid rgba(255,20,147,0.25);
      box-shadow:0 0 18px rgba(255,20,147,0.15);
      position:sticky;
      top:0;
      z-index:999;
    }

    .top-nav a{
      padding:11px 16px;
      border-radius:14px;
      background:#161629;
      color:white;
      text-decoration:none;
      font-weight:bold;
      transition:0.2s;
      border:1px solid rgba(255,255,255,0.08);
    }

    .top-nav a:hover{
      background:#ff1493;
      box-shadow:0 0 18px rgba(255,20,147,0.45);
    }

    .wrapper{
      padding:25px;
    }

    .box{
      width:100%;
      max-width:1000px;
      margin:auto;
      background:#121225;
      padding:28px;
      border-radius:24px;
      box-shadow:0 0 35px rgba(255,20,147,0.35);
    }

    h1,h2{
      color:#ff1493;
      margin-bottom:18px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:#1b1b2e;
      color:white;
      font-size:15px;
      margin-bottom:12px;
    }

    button{
      padding:12px 16px;
      border:none;
      border-radius:12px;
      font-weight:bold;
      cursor:pointer;
      font-size:14px;
    }

    .pink{background:#ff1493;color:white;width:100%}
    .red{background:#ff4d6d;color:white}
    .gray{background:#555;color:white}
    .hidden{display:none}

    .comment{
      background:#0b0b16;
      padding:18px;
      border-radius:18px;
      margin-bottom:15px;
      border:1px solid rgba(255,255,255,0.08);
    }

    .business{
      color:#00d9ff;
      font-weight:bold;
      margin-bottom:8px;
    }

    .meta{
      color:#aaa;
      font-size:13px;
      margin-bottom:10px;
    }

    .reply{
      margin-top:12px;
      padding:12px;
      border-left:4px solid #ff1493;
      background:#18182a;
      border-radius:12px;
    }

    .top-actions{
      display:flex;
      gap:10px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .top-actions button{
      flex:1;
    }

    @media(max-width:700px){

      .top-nav{
        justify-content:flex-start;
        overflow-x:auto;
        flex-wrap:nowrap;
      }

      .top-nav a{
        white-space:nowrap;
      }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html">Übersicht</a>
  <a href="admin.html">Mitarbeiterlogin</a>
  <a href="superadmin.html">SuperAdmin</a>
</nav>

<div class="wrapper">

<div class="box" id="loginBox">

  <h1>SuperOwner Login</h1>

  <input type="password" id="superCodeInput" placeholder="SuperOwner-Code">

  <button class="pink" onclick="login()">
    Einloggen
  </button>

</div>

<div class="box hidden" id="panelBox">

  <h1>Alle Kommentare</h1>

  <div class="top-actions">

    <button class="gray" onclick="loadComments()">
      Aktualisieren
    </button>

    <button class="red" onclick="logout()">
      Ausloggen
    </button>

  </div>

  <div id="commentsList"></div>

</div>

</div>

<script src="superadmin.js?v=2"></script>

</body>
</html>
