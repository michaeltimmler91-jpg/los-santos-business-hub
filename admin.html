<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Admin Panel</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      background:#050510;
      color:white;
      font-family:Arial,sans-serif;
      padding:0;
    }

    .top-nav{
      width:100%;
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      padding:16px;
      background:#0b0b16;
      border-bottom:1px solid rgba(255,20,147,0.25);
      box-shadow:0 0 18px rgba(255,20,147,0.15);
      position:sticky;
      top:0;
      z-index:999;
    }

    .top-nav a{
      padding:11px 16px;
      border-radius:14px;
      background:#161629;
      color:white;
      text-decoration:none;
      font-weight:bold;
      transition:0.2s;
      border:1px solid rgba(255,255,255,0.08);
    }

    .top-nav a:hover{
      background:#ff1493;
      box-shadow:0 0 18px rgba(255,20,147,0.45);
    }

    .wrapper{
      padding:25px;
    }

    .box{
      width:100%;
      max-width:760px;
      margin:auto;
      background:#121225;
      padding:28px;
      border-radius:24px;
      box-shadow:0 0 35px rgba(255,20,147,0.35);
    }

    h1,h2{
      color:#ff1493;
      margin-bottom:18px;
    }

    input,textarea{
      width:100%;
      padding:14px;
      border:none;
      border-radius:14px;
      background:#1b1b2e;
      color:white;
      font-size:15px;
      margin-bottom:12px;
    }

    textarea{
      min-height:110px;
      resize:vertical;
    }

    button{
      width:100%;
      padding:14px;
      margin-top:10px;
      border:none;
      border-radius:14px;
      font-weight:bold;
      cursor:pointer;
      font-size:15px;
    }

    .pink{background:#ff1493;color:white;}
    .green{background:#00ff88;color:black;}
    .red{background:#ff4d6d;color:white;}
    .blue{background:#00d9ff;color:black;}
    .gray{background:#555;color:white;}
    .dark{background:#0b0b16;color:white;border:1px solid rgba(255,255,255,0.15);}

    .hidden{
      display:none;
    }

    .status-box{
      background:#0b0b16;
      padding:14px;
      border-radius:14px;
      margin-bottom:12px;
    }

    .section{
      margin-top:28px;
      padding-top:22px;
      border-top:1px solid rgba(255,255,255,0.12);
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .comment{
      background:#0b0b16;
      padding:16px;
      border-radius:16px;
      margin-bottom:14px;
    }

    .comment strong{
      color:#00d9ff;
    }

    .reply{
      margin-top:10px;
      padding:10px;
      background:#18182a;
      border-left:4px solid #ff1493;
      border-radius:10px;
    }

    .small{
      color:#aaa;
      font-size:13px;
      margin-top:6px;
      margin-bottom:12px;
    }

    @media(max-width:700px){

      .top-nav{
        justify-content:flex-start;
        overflow-x:auto;
        flex-wrap:nowrap;
      }

      .top-nav a{
        white-space:nowrap;
      }

      .row{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html">Übersicht</a>
  <a href="admin.html">Mitarbeiterlogin</a>
  <a href="superadmin.html">SuperAdmin</a>
</nav>

<div class="wrapper">

<div class="box" id="loginBox">

  <h1>Business Login</h1>

  <input type="password" id="codeInput" placeholder="Zugangscode eingeben">

  <button class="pink" onclick="login()">
    Einloggen
  </button>

</div>

<div class="box hidden" id="adminBox">

  <h1 id="businessTitle">Firma</h1>

  <div class="status-box" id="statusText">
    Status: -
  </div>

  <div class="status-box" id="deliveryText">
    Lieferung: -
  </div>

  <div class="row">
    <button class="green" onclick="setOpen(true)">
      Offen
    </button>

    <button class="red" onclick="setOpen(false)">
      Geschlossen
    </button>
  </div>

  <div id="deliveryButtons" class="row">

    <button class="blue" onclick="setDelivery(true)">
      Lieferung Ja
    </button>

    <button class="gray" onclick="setDelivery(false)">
      Lieferung Nein
    </button>

  </div>

  <div class="section" id="ownerLoginBox">

    <h2>Inhaberbereich</h2>

    <input type="password" id="ownerCodeInput" placeholder="Inhaber-Code eingeben">

    <button class="dark" onclick="unlockOwner()">
      Inhaberbereich freischalten
    </button>

    <div class="small">
      Nur Inhaber können Firmendaten ändern.
    </div>

  </div>

  <div class="section hidden" id="ownerPanel">

    <h2>Firmendaten bearbeiten</h2>

    <input type="text" id="plzInput" placeholder="PLZ / Standort">

    <textarea id="descriptionInput" placeholder="Beschreibung"></textarea>

    <input type="text" id="websiteInput" placeholder="Website-Link">

    <input type="text" id="discordInput" placeholder="Verteiler / Discord-Link">

    <button class="blue" onclick="saveOwnerData()">
      Firmendaten speichern
    </button>

  </div>

  <div class="section hidden" id="commentsPanel">

    <h2>Kommentare</h2>

    <div id="adminCommentsList"></div>

  </div>

  <button class="pink" onclick="logout()">
    Ausloggen
  </button>

</div>

</div>

<script src="admin.js?v=999"></script>

</body>
</html>
