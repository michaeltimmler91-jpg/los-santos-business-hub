<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Unternehmen</title>

  <link rel="stylesheet" href="./v2-style.css?v=3000">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="v2-hero">

  <div class="hero-top-actions">

    <button onclick="goDashboard()">
      Dashboard
    </button>

    <button onclick="logoutUser()">
      Ausloggen
    </button>

  </div>

</header>

<div class="auth-page">

  <div class="admin-wrapper">


    <div class="hub-section-intro">

      <div>

         <span class="hub-kicker"><h2>Business Live-Status</h2></span>

        <p>
          Alle aktuellen Unternehmen, &Ouml;ffnungszeiten,
          Lieferdienste und Bewertungen auf einen Blick.
        </p>
      </div>

    </div>

    <div class="hub-top-grid">

      <div class="hub-live-stats">

        <div class="hub-stat-card">
          <strong id="openCount">0</strong>
          <span>Ge&ouml;ffnet</span>
        </div>

        <div class="hub-stat-card">
          <strong id="deliveryCount">0</strong>
          <span>Lieferung aktiv</span>
        </div>

        <div class="hub-stat-card">
          <strong id="reviewCount">0</strong>
          <span>Bewertungen</span>
        </div>

      </div>

      <div class="business-filter-bar">

        <input
          type="text"
          id="searchInput"
          placeholder="Unternehmen suchen..."
          oninput="filterBusinesses()"
        >

        <select
  id="categoryFilter"
  onchange="filterBusinesses()"
>
  <option value="">
    Alle Kategorien
  </option>

  <option value="food">
    Restaurants
  </option>

  <option value="workshop">
    Werkst&auml;tten
  </option>

  <option value="cardealer">
    Autoh&auml;user
  </option>

  <option value="government">
    Staatlich
  </option>

  <option value="service">
    Dienstleistungen
  </option>

</select>

      </div>

    </div>

    <div id="businessList" class="hub-card-grid"></div>

  </div>

</div>

<script src="./v2-firmen.js?v=2809"></script>

<script>
loadBusinesses();
</script>

</body>
</html>
