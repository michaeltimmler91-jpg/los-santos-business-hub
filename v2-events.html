<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Eventkalender</title>

  <link rel="stylesheet" href="./v2-style.css?v=4000">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="v2-hero">

  <div class="hero-top-actions hero-left-actions">

    <button onclick="window.location.href='v2-firmen.html'">
      Firmen&uuml;bersicht
    </button>

  </div>

  <div class="hero-top-actions">

    <button onclick="window.location.href='v2-dashboard.html'">
      Dashboard
    </button>

    <button onclick="logoutUser()">
      Ausloggen
    </button>

  </div>

</header>

<div class="auth-page">

  <div class="admin-wrapper">

    <div class="dashboard-welcome-card">

      <span class="hub-kicker">
        Los Santos
      </span>

      <h2>
        Eventkalender
      </h2>

      <p>
        Alle kommenden Events der Unternehmen auf einen Blick.
      </p>

    </div>

    <div class="business-filter-bar">

      <input
        type="text"
        id="eventSearch"
        placeholder="Event oder Firma suchen..."
        oninput="filterEvents()"
      >

      <select id="eventRange" onchange="filterEvents()">

        <option value="all">
          Alle kommenden Events
        </option>

        <option value="today">
          Heute
        </option>

        <option value="week">
          Diese Woche
        </option>

      </select>

    </div>

    <div id="nextEventBox"></div>

    <div id="eventsList" class="events-grid"></div>

  </div>

</div>

<script src="./v2-events.js?v=4000"></script>

<script>
loadEvents();
</script>

</body>
</html>
