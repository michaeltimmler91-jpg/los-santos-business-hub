<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Unternehmen</title>

  <link rel="stylesheet" href="./style.css?v=1001">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="top-nav">
  <a href="index.html">Zur&uuml;ck zur &Uuml;bersicht</a>
  <a href="admin.html">Mitarbeiterlogin</a>
  <a href="superadmin.html">SuperAdmin</a>
</nav>

<div class="firma-page">

  <div class="firma-card">

    <img id="firmaImage" src="" alt="Firma">

    <div class="firma-content">

      <h1 id="firmaName">L&auml;dt...</h1>

      <div class="firma-badges">
        <span id="firmaStatus" class="status closed">
          Geschlossen
        </span>

        <span id="firmaDelivery" class="delivery no">
          Keine Lieferung
        </span>
      </div>

      <p id="firmaPlz"></p>

      <div class="firma-description">

        <h2>Beschreibung</h2>

        <p id="firmaDescription"></p>

      </div>

      <div class="firma-buttons">

        <a id="websiteBtn"
           href="#"
           target="_blank">
          Website
        </a>

        <a id="discordBtn"
           href="#"
           target="_blank">
          Verteiler
        </a>

      </div>

      <div class="comments-section">

        <h2>
          Kommentare &amp; Bewertungen
        </h2>

        <div id="averageRating"></div>

        <div id="commentsList"></div>

        <input
          type="text"
          id="commentAuthor"
          placeholder="Dein Name"
        >

        <div class="rating-select">

          <span class="star"
                data-value="1">&#9734;</span>

          <span class="star"
                data-value="2">&#9734;</span>

          <span class="star"
                data-value="3">&#9734;</span>

          <span class="star"
                data-value="4">&#9734;</span>

          <span class="star"
                data-value="5">&#9734;</span>

        </div>

        <textarea
          id="commentMessage"
          placeholder="Kommentar schreiben"
        ></textarea>

        <button onclick="sendComment()">
          Kommentar senden
        </button>

      </div>

    </div>

  </div>

</div>

<script src="firma.js?v=40"></script>

</body>
</html>
