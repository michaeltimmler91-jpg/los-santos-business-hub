<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Userverwaltung</title>

  <link rel="stylesheet" href="./v2-style.css?v=3401">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="v2-hero">

<div class="hero-top-actions hero-left-actions">

  <button onclick="window.location.href='v2-firmen.html'">
    Firmen&uuml;bersicht
  </button>

</div>

<div class="hero-top-actions">

  <button onclick="window.location.href='v2-dashboard.html'">
    Dashboard
  </button>

  <button onclick="logoutUser()">
    Ausloggen
  </button>

</div>

</header>

<div class="auth-page">

  <div class="admin-wrapper">

    <div class="dashboard-welcome-card">

      <span class="hub-kicker">
        Verwaltung
      </span>

      <h2>
        Userverwaltung
      </h2>

      <p>
        User freischalten, sperren, entsperren und Rollen verwalten.
      </p>

    </div>

    <div class="business-filter-bar usermgmt-search">

      <input
        type="text"
        id="userSearch"
        placeholder="User suchen..."
      >

    </div>

    <div class="usermgmt-grid">

      <section class="usermgmt-card">

        <span class="hub-kicker">
          Wartend
        </span>

        <h2>Wartet auf Freischaltung</h2>

        <div id="pendingUsers"></div>

      </section>

      <section class="usermgmt-card">

        <span class="hub-kicker">
          Aktiv
        </span>

        <h2>Freigeschaltete User</h2>

        <div id="approvedUsers"></div>

      </section>

      <section class="usermgmt-card">

        <span class="hub-kicker">
          Gesperrt
        </span>

        <h2>Gesperrte User</h2>

        <div id="blockedUsers"></div>

      </section>

    </div>

  </div>

</div>

<script src="./v2-user-management.js?v=3404"></script>

<script>
checkUserManagementAccess();
</script>

</body>
</html>
