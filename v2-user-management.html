<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Userverwaltung</title>

  <link rel="stylesheet" href="./v2-style.css?v=600">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="usermgmt-page">

  <div class="usermgmt-topbar">

    <div>

      <h1>Userverwaltung</h1>

      <p>
        User freischalten, sperren und Rollen verwalten
      </p>

    </div>

    <div class="usermgmt-buttons">

      <button
        class="owner-gray-btn"
        onclick="window.location.href='v2-dashboard.html'"
      >
        Zur&uuml;ck
      </button>

      <button onclick="logoutUser()">
        Ausloggen
      </button>

    </div>

  </div>

  <div class="usermgmt-search">

    <input
      type="text"
      id="userSearch"
      placeholder="User suchen..."
    >

  </div>

  <div class="usermgmt-grid">

    <section class="usermgmt-card">

      <h2>Wartet auf Freischaltung</h2>

      <div id="pendingUsers"></div>

    </section>

    <section class="usermgmt-card">

      <h2>Freigeschaltete User</h2>

      <div id="approvedUsers"></div>

    </section>

    <section class="usermgmt-card">

      <h2>Gesperrte User</h2>

      <div id="blockedUsers"></div>

    </section>

  </div>

</div>

<script src="./v2-user-management.js?v=500"></script>

<script>
checkUserManagementAccess();
</script>

</body>
</html>
