<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mein Account</title>

  <link rel="stylesheet" href="./v2-style.css?v=2400">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="login-page">

  <div class="login-card">

    <div class="login-logo">
      Los Santos<br>
      <span>Business Hub</span>
    </div>

    <h1>Mein Account</h1>

    <p>
      Hier kannst du deinen Anzeigenamen und dein Passwort &auml;ndern.
    </p>

    <label>Anzeigename</label>

    <input
      type="text"
      id="displayName"
      placeholder="Anzeigename"
    >

    <button onclick="saveDisplayName()">
      Anzeigename speichern
    </button>

    <hr class="account-divider">

    <input
      type="password"
      id="newPassword"
      placeholder="Neues Passwort"
    >

    <input
      type="password"
      id="newPasswordRepeat"
      placeholder="Neues Passwort wiederholen"
    >

    <button onclick="changePassword()">
      Passwort speichern
    </button>

    <div class="login-links">

      <a href="v2-dashboard.html">
        Zur&uuml;ck zum Dashboard
      </a>

    </div>

  </div>

</div>

<script src="./v2-account.js?v=2400"></script>

<script>
loadAccount();
</script>

</body>
</html>
