<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Mein Account</title>

  <link rel="stylesheet" href="./v2-style.css?v=3501">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="v2-hero">

  <div class="hero-top-actions">

    <button onclick="window.location.href='v2-dashboard.html'">
      Dashboard
    </button>

    <button onclick="logoutUser()">
      Ausloggen
    </button>

  </div>

</header>

<div class="auth-page">

  <div class="admin-wrapper">

    <div class="dashboard-welcome-card">

      <span class="hub-kicker">
        Account
      </span>

      <h2>
        Mein Account
      </h2>

      <p>
        Hier kannst du deinen Anzeigenamen und dein Passwort &auml;ndern.
      </p>

    </div>

    <div class="account-grid">

      <section class="owner-card account-card">

        <span class="hub-kicker">
          Profil
        </span>

        <h2>Anzeigename</h2>

        <label>Anzeigename</label>

        <input
          type="text"
          id="displayName"
          placeholder="Anzeigename"
        >

        <button onclick="saveDisplayName()">
          Anzeigename speichern
        </button>

      </section>

      <section class="owner-card account-card">

        <span class="hub-kicker">
          Sicherheit
        </span>

        <h2>Passwort</h2>

        <label>Neues Passwort</label>

        <input
          type="password"
          id="newPassword"
          placeholder="Neues Passwort"
        >

        <label>Passwort wiederholen</label>

        <input
          type="password"
          id="newPasswordRepeat"
          placeholder="Neues Passwort wiederholen"
        >

        <button onclick="changePassword()">
          Passwort speichern
        </button>

      </section>

    </div>

  </div>

</div>

<script src="./v2-account.js?v=3500"></script>

<script>
loadAccount();
</script>

</body>
</html>
